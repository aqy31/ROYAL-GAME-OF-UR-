<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>أور الملكية - النسخة الشاملة</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        /* منع التحديد والسحب العشوائي في الموبايل */
        body { 
            margin: 0; overflow: hidden; background-color: #050505; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { background: transparent !important; display: block; touch-action: none; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; } 
        .interactive { pointer-events: auto; }
        
        #bottom-bar { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 15px; align-items: flex-end; justify-content: flex-start; z-index: 20; }
        #roll-btn-container {
            background: linear-gradient(135deg, #d4af37, #8a6a1c); border: 2px solid #000; border-radius: 8px; width: 100px; height: 80px;
            display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; box-shadow: 2px 2px 10px rgba(0,0,0,0.8); transition: 0.2s; pointer-events: auto;
        }
        #roll-btn-container:hover { filter: brightness(1.2); }
        #roll-btn-container:active { transform: scale(0.95); }
        #roll-btn-container.disabled { filter: grayscale(1); opacity: 0.5; cursor: not-allowed; }
        
        .dice-icon { width: 35px; height: 35px; background-color: #0a1526; border-radius: 50%; border: 2px solid #000; margin-bottom: 5px; position: relative; }
        .dice-icon::after { content: ''; position: absolute; top: 10px; left: 10px; width: 4px; height: 4px; background: white; border-radius: 50%; box-shadow: 10px 0 0 white, 5px 10px 0 white; }
        .roll-text { color: #000; font-weight: bold; font-size: 14px; text-shadow: 0px 1px 1px rgba(255,255,255,0.3); }

        #chat-log {
            background: rgba(0, 0, 0, 0.75); border: 1px solid #444; width: 350px; height: 70px; border-radius: 8px;
            padding: 8px; box-sizing: border-box; color: #aaa; font-family: 'Courier New', Courier, monospace; font-size: 12px;
            display: flex; flex-direction: column; justify-content: flex-end; pointer-events: auto;
        }
        .log-entry { margin-bottom: 2px; }

        #launcher {
            position: fixed; inset: 0; background-color: #111; background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .menu-box { background: rgba(10, 5, 0, 0.85); padding: 30px; border: 2px solid #d4af37; border-radius: 15px; text-align: center; backdrop-filter: blur(5px); max-width: 90%;}
        .btn { display: block; width: 100%; max-width: 250px; padding: 15px; margin: 10px auto; background: #d4af37; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; border-radius: 8px;}
        .btn:hover { background: #fff; transform: scale(1.05); }

        #status-bar { position: absolute; top: 20px; width: 100%; text-align: center; color: #d4af37; font-size: 2rem; text-shadow: 2px 2px 4px #000; font-weight: bold; pointer-events: none;}

        #intro-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.7);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 80;
        }
        .intro-box {
            background: rgba(20, 15, 10, 0.95); padding: 25px; border: 2px solid #d4af37; border-radius: 10px; text-align: center; color: white; width: 85%; max-width: 500px; box-shadow: 0 0 30px #000; box-sizing: border-box;
        }
        .intro-box h2 { color: #d4af37; margin-top: 0; border-bottom: 1px solid #d4af37; padding-bottom: 10px; font-size: 22px;}
        .intro-box p { font-size: 16px; line-height: 1.6; text-align: right; margin: 10px 0;}

        /* --- إعدادات الموبايل والآيباد (Responsive) --- */
        @media (max-width: 768px) {
            #status-bar { font-size: 1.5rem; top: 10px; }
            #bottom-bar { bottom: 10px; left: 10px; right: 10px; gap: 10px; }
            #roll-btn-container { width: 80px; height: 70px; }
            .dice-icon { width: 25px; height: 25px; }
            .dice-icon::after { top: 6px; left: 6px; width: 3px; height: 3px; box-shadow: 7px 0 0 white, 3px 7px 0 white; }
            .roll-text { font-size: 12px; }
            #chat-log { width: calc(100% - 90px); height: 70px; font-size: 10px; }
            .menu-box { padding: 20px; }
            .intro-box p { font-size: 14px; }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop>
    </audio>

<div id="ui-layer">
    <div id="status-bar">أور الملكية</div>
    <div id="bottom-bar">
        <div id="roll-btn-container" onclick="if(game && !game.isCinematic) game.rollDice()">
            <div class="dice-icon"></div>
            <div class="roll-text">Roll</div>
        </div>
        <div id="chat-log">
            <div class="log-entry">بدأت اللعبة!</div>
        </div>
    </div>
</div>

<div id="launcher">
    <div class="menu-box">
        <h1 style="color: #d4af37; margin-bottom: 20px;">أور الملكية</h1>
        <button class="btn" onclick="startCinematicIntro('PVP')">لاعب ضد لاعب</button>
        <button class="btn" onclick="startCinematicIntro('BOT')" style="background: #8d6e63;">الكمبيوتر</button>
    </div>
</div>

<div id="intro-overlay">
    <div class="intro-box">
        <h2>تعليمات اللعبة</h2>
        <p>🎲 <b>النرد:</b> ارمِ النرد لتحصل على خطوات (0 إلى 4).</p>
        <p>⚔️ <b>القتال:</b> حرك حجرك نحو المسار المركزي المشترك وتجنب أن يأكلك الخصم.</p>
        <p>🌸 <b>الوردة:</b> قف على مربعات الوردة لتحصل على رمية إضافية وتكون في أمان.</p>
        <button class="btn" onclick="endCinematicIntro()" style="margin-top: 20px;">ابدأ اللعب الآن</button>
    </div>
</div>

<script>
// ==========================================
// 🎨 لوحة تحكم المصمم 🎨
// ==========================================
const DESIGN_ASSETS = {
    mainMenuBackground: 'https://images.unsplash.com/photo-1518098268026-4e89f1a2cd8e?q=80&w=2000',
    tableTexture: 'https://images.unsplash.com/photo-1546484396-fb3fc6f95f98?q=80&w=1000',
    boardNormalCell: 'https://images.unsplash.com/photo-1546484396-fb3fc6f95f98?q=80&w=500',
    boardRosetteCell: 'https://images.unsplash.com/photo-1588629517178-5db77ba13340?q=80&w=500',
    boardSideEdge: 'https://images.unsplash.com/photo-1601058268499-e52658b8ebf8?q=80&w=500',
    pieceTexture: 'https://images.unsplash.com/photo-1521106047354-5a5b85e819ee?q=80&w=500',
    diceTexture: 'https://upload.wikimedia.org/wikipedia/commons/e/e0/Ancient_Mesopotamian_dice.jpg',
    trayTexture: 'https://images.unsplash.com/photo-1522066841261-2679905c1e19?q=80&w=500',
    clayTablet: 'https://images.unsplash.com/photo-1616743845946-b33c0617baea?q=80&w=500', 
    pottery: 'https://images.unsplash.com/photo-1610705462521-1dc53460df76?q=80&w=500',

    // رابط الموسيقى (تأكد أن الملف في مجلدك اسمه music.mp3)
    bgMusic: 'music.mp3'
};

const COLORS = {
    player1: 0x0a1526, player2: 0xaa0000, dice: 0x008080, boardBase: 0x880000 
};
// ==========================================

document.getElementById('launcher').style.backgroundImage = `url('${DESIGN_ASSETS.mainMenuBackground}')`;

const textureLoader = new THREE.TextureLoader();
const textures = {
    table: textureLoader.load(DESIGN_ASSETS.tableTexture),
    boardNorm: textureLoader.load(DESIGN_ASSETS.boardNormalCell),
    boardRosette: textureLoader.load(DESIGN_ASSETS.boardRosetteCell),
    boardEdge: textureLoader.load(DESIGN_ASSETS.boardSideEdge),
    piece: textureLoader.load(DESIGN_ASSETS.pieceTexture),
    dice: textureLoader.load(DESIGN_ASSETS.diceTexture),
    tray: textureLoader.load(DESIGN_ASSETS.trayTexture),
    clay: textureLoader.load(DESIGN_ASSETS.clayTablet),
    pot: textureLoader.load(DESIGN_ASSETS.pottery)
};

const canvas = document.createElement('canvas');
canvas.width = 128; canvas.height = 64;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 64, 64); 
const dashTexture = new THREE.CanvasTexture(canvas);
dashTexture.wrapS = THREE.RepeatWrapping; dashTexture.wrapT = THREE.RepeatWrapping; dashTexture.repeat.set(12, 1);

const CONFIG = { cell: 2.2, gap: 0 };
const PATHS = {
    p1: [[2,3],[2,2],[2,1],[2,0],[1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[2,7],[2,6]],
    p2: [[0,3],[0,2],[0,1],[0,0],[1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[0,7],[0,6]]
};
const ROSETTES = ["0,0", "0,6", "1,3", "2,0", "2,6", "2,0", "2,6"]; 

class Game3D {
    constructor(mode, isCinematic = false) {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color('#050403'); 
        
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true; 
        this.controls.dampingFactor = 0.05;
        this.controls.target.set(0, 0, 0); 
        this.controls.maxPolarAngle = Math.PI / 2.6; 
        this.controls.minDistance = 10;
        this.controls.maxDistance = 50; 
        
        this.pieces = [];
        this.diceModels = [];
        this.turn = 1;
        this.rollValue = 0;
        this.isLocked = false;
        this.p1Pos = Array(7).fill(-1);
        this.p2Pos = Array(7).fill(-1);
        this.mode = mode;
        this.isCinematic = isCinematic;
        this.pointerDownPos = new THREE.Vector2();

        this.initScene();
        this.createEnvironment();
        this.createBoard();
        this.createDiceAndTray();
        this.createDecorations();
        this.createThickGuideLine();
        this.animate();

        // أحداث اللمس والماوس المحدثة
        window.addEventListener('pointerdown', (e) => { this.pointerDownPos.set(e.clientX, e.clientY); });
        window.addEventListener('pointerup', (e) => this.onPointerUp(e));
        window.addEventListener('pointermove', (e) => this.onMouseMove(e));

        // ضبط الكاميرا الأساسية (تبتعد في الموبايل لتشمل اللوحة)
        this.isMobile = window.innerWidth < 768;
        this.defaultCamPos = this.isMobile ? {x: 0, y: 22, z: 32} : {x: 0, y: 16, z: 26};

        if(this.isCinematic) {
            this.camera.position.set(30, 20, 30);
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 1.5;
        } else {
            this.camera.position.set(this.defaultCamPos.x, this.defaultCamPos.y, this.defaultCamPos.z); 
        }
    }

    initScene() {
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // تحسين الأداء للموبايل
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(this.renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffeedd, 0.7);
        this.scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffddaa, 1.2);
        sun.position.set(2, 15, 10); 
        sun.castShadow = true;
        sun.shadow.mapSize.width = 1024; // تقليل دقة الظل قليلاً لسرعة الموبايل
        sun.shadow.mapSize.height = 1024;
        this.scene.add(sun);

        const pointLight = new THREE.PointLight(0xffaa55, 0.8, 50);
        pointLight.position.set(0, 10, 0);
        this.scene.add(pointLight);
    }

    createEnvironment() {
        textures.table.wrapS = THREE.RepeatWrapping; textures.table.wrapT = THREE.RepeatWrapping;
        textures.table.repeat.set(8, 8); 
        const tableGeo = new THREE.BoxGeometry(70, 1, 50);
        const tableMat = new THREE.MeshStandardMaterial({ map: textures.table, color: 0x5a3a22, roughness: 1 });
        const table = new THREE.Mesh(tableGeo, tableMat);
        table.position.set(0, -0.5, 0);
        table.receiveShadow = true;
        this.scene.add(table);
    }

    createBoard() {
        const boardGroup = new THREE.Group();
        for(let r=0; r<3; r++) {
            for(let c=0; c<8; c++) {
                if((r==0||r==2) && (c==4||c==5)) continue;
                const isRosette = (r===0&&c===0)||(r===0&&c===6)||(r===1&&c===3)||(r===2&&c===0)||(r===2&&c===6);
                
                const topMat = new THREE.MeshStandardMaterial({ map: isRosette ? textures.boardRosette : textures.boardNorm, color: isRosette ? 0xffeebb : 0xeeddcc, roughness: 0.8 });
                const sideMat = new THREE.MeshStandardMaterial({ map: textures.boardEdge, color: COLORS.boardBase, roughness: 0.9 });
                const materials = [sideMat, sideMat, topMat, sideMat, sideMat, sideMat];

                const geo = new THREE.BoxGeometry(CONFIG.cell, 1.2, CONFIG.cell); 
                const tile = new THREE.Mesh(geo, materials);
                tile.position.set((c - 3.5) * CONFIG.cell, 0.6, (r - 1) * CONFIG.cell);
                tile.receiveShadow = true; tile.castShadow = true;
                
                const edges = new THREE.EdgesGeometry(geo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial( { color: 0x550000, linewidth: 2 } ) );
                tile.add(line);

                tile.userData = { type: 'tile', r, c };
                boardGroup.add(tile);
            }
        }
        this.scene.add(boardGroup);
        this.initPieces();
    }

    initPieces() {
        const createSet = (player) => {
            for(let i=0; i<7; i++) {
                const geo = new THREE.SphereGeometry(0.85, 32, 16);
                geo.applyMatrix4(new THREE.Matrix4().makeScale(1, 0.35, 1)); 

                const mat = new THREE.MeshStandardMaterial({ 
                    color: player === 1 ? COLORS.player1 : COLORS.player2,
                    map: textures.piece, metalness: 0.2, roughness: 0.5
                });
                
                const piece = new THREE.Mesh(geo, mat);
                piece.castShadow = true; piece.receiveShadow = true;
                piece.userData = { type: 'piece', player, id: i, anim: null, baseY: 0 };
                
                const zOffset = player === 1 ? 5.5 : -5.5;
                piece.position.set(-6 + (i * 2), 0.35, zOffset);
                piece.userData.baseY = 0.35; 

                if(player === 1) {
                    const dotGeo = new THREE.SphereGeometry(0.12, 16, 16);
                    dotGeo.applyMatrix4(new THREE.Matrix4().makeScale(1, 0.3, 1));
                    const dotMat = new THREE.MeshBasicMaterial({color: 0xffffff});
                    const dot = new THREE.Mesh(dotGeo, dotMat);
                    dot.position.y = 0.3; 
                    piece.add(dot);
                }
                this.scene.add(piece);
                this.pieces.push(piece);
            }
        };
        createSet(1); createSet(2);
    }

    createDiceAndTray() {
        const trayGeo = new THREE.CylinderGeometry(3.5, 3, 0.5, 32);
        const trayMat = new THREE.MeshStandardMaterial({ map: textures.tray, color: 0xb8860b, metalness: 0.7, roughness: 0.6 });
        const tray = new THREE.Mesh(trayGeo, trayMat);
        tray.position.set(-14.5, 0.25, 0); 
        tray.receiveShadow = true; tray.castShadow = true;
        
        const trayInnerGeo = new THREE.CylinderGeometry(3.3, 2.8, 0.51, 32);
        const trayInnerMat = new THREE.MeshStandardMaterial({ map: textures.tray, color: 0x8a6300, metalness: 0.8, roughness: 0.8 });
        const trayInner = new THREE.Mesh(trayInnerGeo, trayInnerMat);
        trayInner.position.y = 0.1;
        tray.add(trayInner);
        this.scene.add(tray);

        const geo = new THREE.TetrahedronGeometry(0.65);
        for(let i=0; i<4; i++) {
            const mat = new THREE.MeshStandardMaterial({ map: textures.dice, color: COLORS.dice, roughness: 0.6, metalness: 0.2 });
            const die = new THREE.Mesh(geo, mat);
            die.position.set(-14.5 + (Math.random()*2 - 1), 0.6, (Math.random()*2 - 1));
            die.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            die.castShadow = true;
            this.scene.add(die);
            this.diceModels.push(die);
        }
    }

    createDecorations() {
        const tabletGeo1 = new THREE.BoxGeometry(4, 0.3, 5);
        const tabletMat = new THREE.MeshStandardMaterial({ map: textures.clay, color: 0xaa8866, roughness: 0.9 });
        const tablet1 = new THREE.Mesh(tabletGeo1, tabletMat);
        tablet1.position.set(13, 0.15, -4);
        tablet1.rotation.y = -Math.PI / 6;
        tablet1.castShadow = true;
        this.scene.add(tablet1);

        const tabletGeo2 = new THREE.BoxGeometry(3.5, 0.3, 4.5);
        const tablet2 = new THREE.Mesh(tabletGeo2, tabletMat);
        tablet2.position.set(12, 0.45, -3); 
        tablet2.rotation.y = Math.PI / 8;
        tablet2.castShadow = true;
        this.scene.add(tablet2);

        const potGeo = new THREE.SphereGeometry(2.5, 32, 16);
        potGeo.applyMatrix4(new THREE.Matrix4().makeScale(1, 1.4, 1)); 
        const potMat = new THREE.MeshStandardMaterial({ map: textures.pot, color: 0x885533, roughness: 1 });
        const pot = new THREE.Mesh(potGeo, potMat);
        pot.position.set(16, 1.8, -12);
        pot.castShadow = true;
        this.scene.add(pot);
    }

    createThickGuideLine() {
        this.guideMat = new THREE.MeshBasicMaterial({
            color: 0xffffff, alphaMap: dashTexture, transparent: true, opacity: 0.8, depthTest: false
        });
        this.guideMesh = new THREE.Mesh(new THREE.BufferGeometry(), this.guideMat);
        this.scene.add(this.guideMesh);
        this.guideMesh.visible = false;
        this.guideMesh.renderOrder = 999; 
    }

    logChat(msg) {
        const log = document.getElementById('chat-log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        const time = new Date().toLocaleTimeString('en-US', { hour12: false });
        entry.innerText = `${time}: ${msg}`;
        log.appendChild(entry);
        if(log.children.length > 3) log.removeChild(log.firstChild);
    }

    async rollDice() {
        if(this.isLocked || this.isCinematic) return;
        this.isLocked = true;
        
        const btn = document.getElementById('roll-btn-container');
        btn.classList.add('disabled');

        let val = 0;
        const anims = [];

        this.diceModels.forEach((die, index) => {
            const isLit = Math.random() < 0.5;
            if(isLit) val++;
            
            anims.push(gsap.to(die.rotation, { x: Math.random()*10, y: Math.random()*10, duration: 0.6, ease: "power2.out" }));
            anims.push(gsap.to(die.position, { 
                y: 2, duration: 0.3, yoyo: true, repeat: 1, ease: "power1.out",
                x: -14.5 + (Math.random()*3 - 1.5), z: (Math.random()*3 - 1.5)
            }));
            
            if(isLit) {
                anims.push(gsap.to(die.material, { emissive: 0xffffff, emissiveIntensity: 0.3, duration: 0.6 }));
            } else {
                anims.push(gsap.to(die.material, { emissive: 0x000000, emissiveIntensity: 0, duration: 0.6 }));
            }
        });

        await Promise.all(anims);
        this.rollValue = val;
        this.logChat(`النتيجة: ${val}`);

        if(val === 0) {
            setTimeout(() => this.switchTurn(), 1000);
        } else {
            const moves = this.getPossibleMoves(this.turn);
            if(moves.length === 0) {
                this.logChat("لا توجد حركات متاحة.");
                setTimeout(() => this.switchTurn(), 1000);
            } else if(this.turn === 2 && this.mode === 'BOT') {
                setTimeout(() => this.aiMove(moves), 1000);
            } else {
                this.isLocked = false;
                this.highlightValidPieces(moves);
            }
        }
    }

    getPossibleMoves(p) {
        const my = p === 1 ? this.p1Pos : this.p2Pos;
        const opp = p === 1 ? this.p2Pos : this.p1Pos;
        return my.map((pos, i) => i).filter(i => {
            const target = my[i] + this.rollValue;
            if(target > 14) return false;
            if(my.includes(target) && target !== 14) return false;
            if(target === 7 && opp.includes(7)) return false;
            return true;
        });
    }

    highlightValidPieces(moves) {
        this.pieces.forEach(p => {
            if (p.userData.player === this.turn && moves.includes(p.userData.id)) {
                if (!p.userData.anim) {
                    p.userData.baseY = p.position.y;
                    p.userData.anim = gsap.to(p.position, { y: p.userData.baseY + 0.5, duration: 0.4, yoyo: true, repeat: -1 });
                }
            }
        });
    }

    clearHighlights() {
        this.pieces.forEach(p => {
            if (p.userData.anim) {
                p.userData.anim.kill(); p.userData.anim = null;
                gsap.to(p.position, { y: p.userData.baseY, duration: 0.2 });
            }
        });
    }

    drawGuideLine(piece) {
        const player = piece.userData.player;
        const path = player === 1 ? PATHS.p1 : PATHS.p2;
        const newPosIdx = (player === 1 ? this.p1Pos[piece.userData.id] : this.p2Pos[piece.userData.id]) + this.rollValue;

        let targetX, targetZ;
        if (newPosIdx < 14) {
            targetX = (path[newPosIdx][1] - 3.5) * CONFIG.cell;
            targetZ = (path[newPosIdx][0] - 1) * CONFIG.cell;
        } else {
            targetX = 14; targetZ = piece.position.z;
        }

        const start = piece.position.clone();
        const end = new THREE.Vector3(targetX, 1.4, targetZ);
        const mid = start.clone().lerp(end, 0.5); mid.y += 3; 

        const curve = new THREE.QuadraticBezierCurve3(start, mid, end);
        if(this.guideMesh.geometry) this.guideMesh.geometry.dispose();
        this.guideMesh.geometry = new THREE.TubeGeometry(curve, 30, 0.15, 8, false);
        this.guideMesh.visible = true;
    }

    onMouseMove(event) {
        // تحديث الإحداثيات مع دعم اللمس (Touch) والموبايل
        let clientX = event.clientX;
        let clientY = event.clientY;
        if(event.touches && event.touches.length > 0) {
            clientX = event.touches[0].clientX;
            clientY = event.touches[0].clientY;
        }

        this.mouse.x = (clientX / window.innerWidth) * 2 - 1;
        this.mouse.y = -(clientY / window.innerHeight) * 2 + 1;

        if (this.isLocked || this.isCinematic || this.rollValue === 0 || (this.mode === 'BOT' && this.turn === 2)) {
            if(this.guideMesh) this.guideMesh.visible = false;
            return;
        }

        this.raycaster.setFromCamera(this.mouse, this.camera);
        const intersects = this.raycaster.intersectObjects(this.pieces);

        if (intersects.length > 0) {
            const obj = intersects[0].object;
            if (obj.userData.player === this.turn && this.getPossibleMoves(this.turn).includes(obj.userData.id)) {
                this.drawGuideLine(obj);
                return;
            }
        }
        if(this.guideMesh) this.guideMesh.visible = false;
    }

    onPointerUp(event) {
        if (this.isCinematic) return;
        // زيادة التسامح في الموبايل لتمييز اللمس عن السحب (كانت 5 أصبحت 15)
        if (Math.hypot(event.clientX - this.pointerDownPos.x, event.clientY - this.pointerDownPos.y) > 15) return; 
        if(this.isLocked || this.rollValue === 0) return;

        this.raycaster.setFromCamera(this.mouse, this.camera);
        const intersects = this.raycaster.intersectObjects(this.pieces);

        if(intersects.length > 0) {
            const obj = intersects[0].object;
            if(obj.userData.player === this.turn && this.getPossibleMoves(this.turn).includes(obj.userData.id)) {
                this.movePiece(obj.userData.id, this.turn);
            }
        }
    }

    async movePiece(pIdx, player) {
        this.isLocked = true;
        this.guideMesh.visible = false; 
        this.clearHighlights(); 
        
        const my = player === 1 ? this.p1Pos : this.p2Pos;
        const opp = player === 1 ? this.p2Pos : this.p1Pos;
        const path = player === 1 ? PATHS.p1 : PATHS.p2;
        const oppPath = player === 1 ? PATHS.p2 : PATHS.p1;

        my[pIdx] += this.rollValue;
        const newPosIdx = my[pIdx];
        const pieceObj = this.pieces.find(p => p.userData.player === player && p.userData.id === pIdx);

        if(newPosIdx < 14) {
            const targetX = (path[newPosIdx][1] - 3.5) * CONFIG.cell;
            const targetZ = (path[newPosIdx][0] - 1) * CONFIG.cell;
            
            gsap.to(pieceObj.position, { x: targetX, z: targetZ, duration: 0.6, ease: "power2.inOut" });
            await gsap.to(pieceObj.position, { y: 3, duration: 0.3, yoyo: true, repeat: 1, ease: "power1.inOut" });
            pieceObj.position.y = 1.4; 
            pieceObj.userData.baseY = 1.4; 

            if(newPosIdx >= 4 && newPosIdx <= 11) {
                const capturedIdx = opp.findIndex((pos, i) => pos !== -1 && pos !== 14 && oppPath[pos][0] === path[newPosIdx][0] && oppPath[pos][1] === path[newPosIdx][1]);
                if(capturedIdx !== -1) {
                    opp[capturedIdx] = -1;
                    const oppPiece = this.pieces.find(p => p.userData.player !== player && p.userData.id === capturedIdx);
                    gsap.to(oppPiece.position, { x: -6 + (capturedIdx*2), y: 0.35, z: player === 1 ? -5.5 : 5.5, duration: 0.6, ease: "bounce.out" });
                    oppPiece.userData.baseY = 0.35; 
                    this.logChat("تم أكل حجر!");
                }
            }

            const isRosette = (path[newPosIdx][0]===0&&path[newPosIdx][1]===0)||(path[newPosIdx][0]===0&&path[newPosIdx][1]===6)||(path[newPosIdx][0]===1&&path[newPosIdx][1]===3)||(path[newPosIdx][0]===2&&path[newPosIdx][1]===0)||(path[newPosIdx][0]===2&&path[newPosIdx][1]===6);
            if(isRosette) {
                this.logChat("وقفت على الوردة! ارمِ مجدداً.");
                this.resetForNextRoll();
                return;
            }
        } else {
            gsap.to(pieceObj.position, { x: 14, y: 0.35, duration: 0.6 });
            pieceObj.userData.baseY = 0.35;
            this.logChat("الحجر وصل للنهاية.");
            this.updateScore();
        }

        this.switchTurn();
    }

    aiMove(moves) { this.movePiece(moves[0], 2); }

    switchTurn() {
        this.turn = this.turn === 1 ? 2 : 1;
        this.resetForNextRoll();
        if(this.turn === 2 && this.mode === 'BOT') setTimeout(() => this.rollDice(), 1500); 
    }

    resetForNextRoll() {
        this.isLocked = false;
        this.rollValue = 0;
        
        const btn = document.getElementById('roll-btn-container');
        if(this.turn === 1) {
            btn.classList.remove('disabled');
            document.getElementById('status-bar').innerText = "دورك للعب";
        } else {
            btn.classList.add('disabled');
            document.getElementById('status-bar').innerText = this.mode === 'BOT' ? "الكمبيوتر يفكر..." : "دور الخصم";
        }
        this.clearHighlights();
    }

    updateScore() {
        const s1 = this.p1Pos.filter(p => p === 14).length;
        const s2 = this.p2Pos.filter(p => p === 14).length;
        if(s1 === 7 || s2 === 7) document.getElementById('status-bar').innerText = s1 === 7 ? "🎉 لقد فزت!" : "🎉 الخصم فاز!";
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        dashTexture.offset.x -= 0.04; 
        this.controls.update(); 
        this.renderer.render(this.scene, this.camera);
    }
}

let game;

function startCinematicIntro(mode) {
    document.getElementById('launcher').style.display = 'none';
    document.getElementById('intro-overlay').style.display = 'flex';
    game = new Game3D(mode, true);
}

// تعديل الدالة لضمان عمل الصوت فوراً في الموبايل
function endCinematicIntro() {
    document.getElementById('intro-overlay').style.display = 'none';
    
    // إجبار الصوت على العمل داخل نفس ضغطة الزر
    const audio = document.getElementById('bg-music');
    audio.src = DESIGN_ASSETS.bgMusic; 
    audio.volume = 0.4; 
    
    let playPromise = audio.play();
    if (playPromise !== undefined) {
        playPromise.catch(error => {
            // حل استثنائي للأجهزة العنيدة جداً
            console.log("الصوت محظور مؤقتاً، سيتم التشغيل مع اللمسة القادمة");
            window.addEventListener('pointerdown', () => audio.play(), { once: true });
        });
    }

    game.isCinematic = false;
    game.controls.autoRotate = false;
    gsap.to(game.camera.position, {
        x: game.defaultCamPos.x, 
        y: game.defaultCamPos.y, 
        z: game.defaultCamPos.z, 
        duration: 2, ease: "power2.inOut",
        onComplete: () => {
            document.getElementById('ui-layer').style.display = 'block';
        }
    });
}

window.addEventListener('resize', () => {
    if(!game) return;
    game.isMobile = window.innerWidth < 768;
    game.defaultCamPos = game.isMobile ? {x: 0, y: 22, z: 32} : {x: 0, y: 16, z: 26};
    
    if(!game.isCinematic) {
        game.camera.position.set(game.defaultCamPos.x, game.defaultCamPos.y, game.defaultCamPos.z);
    }
    game.camera.aspect = window.innerWidth / window.innerHeight;
    game.camera.updateProjectionMatrix();
    game.renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
