<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Game of Ur - Pro Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #050505; 
            font-family: 'Papyrus', fantasy, sans-serif; 
            touch-action: none; user-select: none; -webkit-user-select: none;
        }
        canvas { background: transparent !important; display: block; touch-action: none; outline: none; }
        
        img { border: none; background: transparent; -webkit-user-drag: none; }

        /* 🚨 تصميم الأزرار البديلة (تظهر فقط إذا صورتك ما كانت موجودة) 🚨 */
        .fallback-btn {
            background: rgba(20, 10, 0, 0.9); border: 2px solid #d4af37; color: #d4af37;
            padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 16px;
            cursor: pointer; text-align: center; width: 280px; max-width: 85vw;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8); margin: 5px 0; transition: 0.2s;
            font-family: 'Papyrus', fantasy, sans-serif;
        }
        .fallback-btn:hover { background: #d4af37; color: #000; }
        
        .fallback-text { color: #d4af37; font-size: 18px; font-weight: bold; }

        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 10; display: none; } 
        .interactive { pointer-events: auto; }
        
        #top-ui {
            position: absolute; top: 15px; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 20;
        }
        .score-box {
            background: rgba(10, 5, 0, 0.85); border: 2px solid #d4af37; padding: 10px; border-radius: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 80px; pointer-events: auto;
        }
        .score-box.p1 { border-color: #4cc9f0; } 
        .score-box.p2 { border-color: #f72585; } 
        .score-num { display: block; font-size: 1.8rem; color: white; margin-top: 5px; font-weight: bold;}
        
        #status-bar { display: flex; justify-content: center; align-items: center; }

        #in-game-settings-btn {
            width: 50px; height: 50px; cursor: pointer; pointer-events: auto; transition: transform 0.2s;
        }
        #in-game-settings-btn:hover { transform: scale(1.1); }

        #settings-menu {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 120; pointer-events: auto;
        }
        .settings-box {
            background-color: rgba(20, 10, 0, 0.95); /* لون احتياطي لو اختفت الصورة */
            background-image: url('set_bg.png'); 
            background-size: 100% 100%; background-position: center; background-repeat: no-repeat;
            border: 2px solid #d4af37; border-radius: 15px;
            padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 15px; 
            width: 85vw; max-width: 500px; max-height: 85vh; overflow-y: auto; box-sizing: border-box;
        }
        .slider-container { width: 100%; text-align: center;}
        
        input[type=range] { 
            -webkit-appearance: none; width: 85%; background: transparent; cursor: pointer; touch-action: manipulation !important; pointer-events: auto;
        }
        input[type=range]:focus { outline: none; }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 20px; background: rgba(212, 175, 55, 0.3); border: 1px solid #d4af37; border-radius: 10px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 30px; width: 30px; background: #d4af37; border-radius: 50%; margin-top: -6px; 
        }
        
        .flex-row { display: flex; gap: 10px; align-items: center; justify-content: center; width: 100%; flex-direction: column;}

        #bottom-bar { position: absolute; bottom: 20px; left: 20px; right: 20px; display: flex; gap: 15px; align-items: flex-end; justify-content: space-between; z-index: 20; }
        
        .roll-img-btn {
            width: 130px; height: auto; cursor: pointer; pointer-events: auto; transition: 0.2s;
            filter: drop-shadow(0px 5px 10px rgba(0,0,0,0.6));
        }
        .roll-img-btn:hover { transform: scale(1.05); }
        .roll-img-btn:active { transform: scale(0.95); }
        .roll-img-btn.disabled { filter: grayscale(1) opacity(0.5); cursor: not-allowed; pointer-events: none;}
        
        #chat-log {
            background-color: rgba(10, 5, 0, 0.8); border: 2px solid #d4af37; border-radius: 10px; /* بديل للصورة المفقودة */
            background-image: url('chat_bg.png'); background-size: 100% 100%; background-repeat: no-repeat;
            width: 350px; height: 90px; padding: 15px 25px; 
            box-sizing: border-box; color: #fff; font-size: 14px; font-weight: bold;
            display: flex; flex-direction: column; justify-content: flex-end; pointer-events: auto;
        }
        .log-entry { margin-bottom: 3px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 2px;}

        #launcher {
            position: fixed; inset: 0; background-color: #111; background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
            overflow-y: auto; padding: 20px 0 80px 0;
        }
        .menu-buttons {
            display: flex; flex-direction: column; gap: 0px; align-items: center; 
            background: transparent; padding: 0; margin: auto; width: 100%;
        }
        .img-btn { 
            width: 320px; max-width: 90vw; height: auto; cursor: pointer; transition: transform 0.2s;
            margin: 0 !important; padding: 0 !important; display: block;
            filter: drop-shadow(0px 6px 12px rgba(0,0,0,0.6)); 
        }
        .img-btn:hover { transform: scale(1.03); z-index: 2; position: relative; }

        #footer {
            position: fixed; bottom: 0; width: 100%; height: 45px;
            background: #000000; border: none; 
            display: flex; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box;
            z-index: 101;
        }
        .footer-left { display: flex; gap: 15px; align-items: center; }
        .social-icon { width: 25px; height: 25px; cursor: pointer; transition: transform 0.2s; }
        .social-icon:hover { transform: scale(1.1); }
        .footer-center { position: absolute; left: 50%; transform: translateX(-50%); }
        .company-logo { height: 35px; width: auto; }
        .footer-right { color: #d4af37; font-weight: bold; font-size: 13px; }

        #intro-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 80;
        }
        
        #zoom-hint {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            display: none; z-index: 50; pointer-events: none; opacity: 0;
        }

        @media (max-width: 768px) {
            #top-ui { padding: 10px; top: 5px; }
            .score-box { padding: 5px; min-width: 60px; }
            .score-num { font-size: 1.4rem; margin-top: 2px;}
            #in-game-settings-btn, .fallback-settings-icon { width: 40px; height: 40px; }
            #bottom-bar { bottom: 15px; left: 10px; right: 10px; gap: 10px; flex-direction: row;}
            .roll-img-btn, .fallback-roll { width: 100px; font-size: 14px;}
            #chat-log { width: calc(100% - 110px); height: 75px; font-size: 11px; padding: 10px 15px; }
            .company-logo { height: 28px; }
            #img-turn { height: 30px !important; }
            .settings-box { width: 95vw; padding: 20px; }
        }
    </style>
</head>
<body>

<audio id="bg-music" loop></audio>

<div id="ui-layer">
    <div id="top-ui">
        <div class="score-box p1">
            <img id="img-p1-name" src="p1_name.png" onerror="replaceWithText(this, 'Lapis Lazuli')" style="height: 25px; max-width: 100%; object-fit: contain;">
            <span class="score-num" id="s1">0</span>
        </div>
        
        <div id="status-bar">
            <img id="img-turn" src="turn_p1.png" onerror="replaceWithText(this, 'Your Turn')" style="height: 40px; object-fit: contain;">
        </div>

        <div class="score-box p2">
            <img id="img-p2-name" src="p2_name.png" onerror="replaceWithText(this, 'Carnelian')" style="height: 25px; max-width: 100%; object-fit: contain;">
            <span class="score-num" id="s2">0</span>
        </div>

        <img id="in-game-settings-btn" src="set_icon.png" onerror="replaceWithButton(this, '☰', 'playClickSound(); openSettings();', 'fallback-settings-icon')" onclick="playClickSound(); openSettings();" alt="Settings">
    </div>
    
    <div id="bottom-bar">
        <img id="btn-roll" src="btn_roll.png" class="roll-img-btn" onerror="replaceWithButton(this, '🎲 Roll', 'playClickSound(); if(game && !game.isCinematic) game.rollDice()', 'fallback-btn fallback-roll')" onclick="playClickSound(); if(game && !game.isCinematic) game.rollDice()" alt="Roll Dice">
        
        <div id="chat-log">
            <div class="log-entry">🟢 Game ready, Good luck!</div>
        </div>
    </div>

    <div id="zoom-hint">
        <img id="img-zoom-hint" src="zoom_hint.png" onerror="replaceWithText(this, '🔍 Move & Zoom')" style="width: 250px; max-width: 80vw; height: auto;">
    </div>
</div>

<div id="settings-menu">
    <div class="settings-box">
        <img id="img-set-title" src="set_title.png" onerror="replaceWithText(this, 'Settings')" style="width: 250px; height: auto; margin-bottom: 5px;">
        
        <div class="slider-container">
            <img id="img-set-music" src="set_music.png" onerror="replaceWithText(this, 'Music')" style="width: 160px; height: auto; margin: 0 auto 5px auto; display: block;">
            <div class="flex-row">
                <input type="range" id="bgm-slider" min="0" max="1" step="0.05" value="0.4" oninput="updateBGM(this.value)">
            </div>
        </div>
        
        <div class="slider-container">
            <img id="img-set-sfx" src="set_sfx.png" onerror="replaceWithText(this, 'SFX')" style="width: 160px; height: auto; margin: 0 auto 5px auto; display: block;">
            <div class="flex-row">
                <input type="range" id="sfx-slider" min="0" max="1" step="0.05" value="1.0" oninput="updateSFX(this.value)">
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-top: 15px;">
            <img id="img-set-resume" src="set_resume.png" class="img-btn" onerror="replaceWithButton(this, 'Resume', 'playClickSound(); closeSettings();', 'fallback-btn')" onclick="playClickSound(); closeSettings();">
            <img id="img-set-restart" src="set_restart.png" class="img-btn" onerror="replaceWithButton(this, 'Restart', 'playClickSound(); restartGame();', 'fallback-btn')" onclick="playClickSound(); restartGame();">
            <img id="img-set-exit" src="set_exit.png" class="img-btn" onerror="replaceWithButton(this, 'Exit', 'playClickSound(); exitGame();', 'fallback-btn')" onclick="playClickSound(); exitGame();">
        </div>
    </div>
</div>

<div id="launcher">
    <div class="menu-buttons">
        <img id="btn-pvp" src="btn1.png" class="img-btn" onerror="replaceWithButton(this, 'Local PVP', 'playClickSound(); startCinematicIntro(\'PVP\');', 'fallback-btn')" onclick="playClickSound(); startCinematicIntro('PVP');">
        <img id="btn-online" src="btn2.png" class="img-btn" onerror="replaceWithButton(this, 'Online', 'playClickSound(); alert(\'Online multiplayer coming soon!\');', 'fallback-btn')" onclick="playClickSound(); alert('Online multiplayer coming soon!');">
        <img id="btn-bot" src="btn3.png" class="img-btn" onerror="replaceWithButton(this, 'Play vs Bot', 'playClickSound(); startCinematicIntro(\'BOT\');', 'fallback-btn')" onclick="playClickSound(); startCinematicIntro('BOT');">
        <img id="btn-settings" src="btn4.png" class="img-btn" onerror="replaceWithButton(this, 'Settings', 'playClickSound(); openSettings();', 'fallback-btn')" onclick="playClickSound(); openSettings();">
    </div>

    <div id="footer">
        <div class="footer-left">
            <a href="https://t.me/aqy_31" target="_blank"><img id="logo-tele" src="tele.png" class="social-icon" onerror="this.style.display='none'" alt="Telegram"></a>
            <a href="https://www.instagram.com/aqy31_?igsh=MWx1eTFod3RnazRuYw%3D%3D&utm_source=qr" target="_blank"><img id="logo-insta" src="insta.png" class="social-icon" onerror="this.style.display='none'" alt="Instagram"></a>
        </div>
        <div class="footer-center">
            <img id="logo-center" src="logo.png" class="company-logo" onerror="replaceWithText(this, 'AQY31')" alt="Company Logo">
        </div>
        <div class="footer-right">
            © 2026
        </div>
    </div>
</div>

<div id="intro-overlay" onclick="playClickSound(); endCinematicIntro();" style="cursor: pointer;">
    <img id="img-instructions" src="instructions.png" onerror="replaceWithButton(this, 'Click to Start Game', '', 'fallback-btn')" style="height: 85vh; width: auto; max-width: 95vw; object-fit: contain; filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.9)); transition: 0.2s;">
</div>

<script>
// 🚨 دوال ذكية لإخفاء علامات الاستفهام وتحويلها لنصوص/أزرار مرتبة لين ترفع صورك 🚨
function replaceWithText(imgElement, text) {
    const span = document.createElement('span');
    span.className = 'fallback-text';
    span.innerText = text;
    imgElement.parentNode.insertBefore(span, imgElement);
    imgElement.style.display = 'none';
}

function replaceWithButton(imgElement, text, onclickAction, className) {
    const btn = document.createElement('button');
    btn.className = className;
    btn.innerText = text;
    btn.setAttribute('onclick', onclickAction);
    if(imgElement.id) btn.id = imgElement.id;
    imgElement.parentNode.insertBefore(btn, imgElement);
    imgElement.style.display = 'none';
}

// 🚨 الروابط الأساسية 🚨
const DESIGN_ASSETS = {
    boardTex: 'board.png',
    boardSideTex: 'board_side.png', 
    mainMenuBackground: 'wall.png',
    roomWallTexture: 'wall.png',
    mainTable: 'table.png',
    tableSideTex: 'table_side.png', 
    trayTexture: 'tray.png',
    pieceBlue: 'blue.png',
    pieceRed: 'red.png',
    diceTex: 'dice.png',
    clayTabletTex: 'clay.png', 
    bgMusic: 'music.mp3',
    diceSound: 'dice.mp3', 
    moveSound: 'move.mp3'  
};

document.getElementById('launcher').style.backgroundImage = `url('bg.png')`;
document.getElementById('bg-music').src = DESIGN_ASSETS.bgMusic;

const AudioContext = window.AudioContext || window.webkitAudioContext;
const audioCtx = new AudioContext();
const audioBuffers = {};

let sfxVolume = 1.0;

async function loadSFX(id, url) {
    try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        const decodedData = await audioCtx.decodeAudioData(arrayBuffer);
        audioBuffers[id] = decodedData;
    } catch (err) {}
}

loadSFX('dice', DESIGN_ASSETS.diceSound);
loadSFX('move', DESIGN_ASSETS.moveSound);
loadSFX('click', 'click.mp3'); 

function playSFX(id) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (sfxVolume <= 0) return;

    if (audioBuffers[id]) {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffers[id];
        const gainNode = audioCtx.createGain();
        gainNode.gain.value = sfxVolume;
        source.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        source.start(0);
    }
}

function playClickSound() { playSFX('click'); }

function updateBGM(val) { document.getElementById('bg-music').volume = parseFloat(val); }
function updateSFX(val) { sfxVolume = parseFloat(val); }

function openSettings() { 
    document.getElementById('settings-menu').style.display = 'flex'; 
    if (game == null) {
        document.getElementById('img-set-restart').style.display = 'none';
        document.getElementById('img-set-exit').style.display = 'none';
    } else {
        document.getElementById('img-set-restart').style.display = 'block';
        document.getElementById('img-set-exit').style.display = 'block';
    }
}
function closeSettings() { document.getElementById('settings-menu').style.display = 'none'; }

const textureLoader = new THREE.TextureLoader();

// 🚨 ألوان احتياطية في حال الصورة مفقودة ما تطلع اللعبة سوداء 🚨
const textures = {
    boardTex: textureLoader.load(DESIGN_ASSETS.boardTex),
    boardSide: textureLoader.load(DESIGN_ASSETS.boardSideTex),
    table: textureLoader.load(DESIGN_ASSETS.mainTable),
    tableSide: textureLoader.load(DESIGN_ASSETS.tableSideTex), 
    pieceBlue: textureLoader.load(DESIGN_ASSETS.pieceBlue),
    pieceRed: textureLoader.load(DESIGN_ASSETS.pieceRed),
    dice: textureLoader.load(DESIGN_ASSETS.diceTex),
    tray: textureLoader.load(DESIGN_ASSETS.trayTexture),
    clay: textureLoader.load(DESIGN_ASSETS.clayTabletTex),
    roomWall: textureLoader.load(DESIGN_ASSETS.roomWallTexture)
};

const canvas = document.createElement('canvas');
canvas.width = 128; canvas.height = 64;
const ctx = canvas.getContext('2d');
ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, 64, 64); 
const dashTexture = new THREE.CanvasTexture(canvas);
dashTexture.wrapS = THREE.RepeatWrapping; dashTexture.wrapT = THREE.RepeatWrapping; dashTexture.repeat.set(12, 1);

const CONFIG = { cx: 13.76 / 8, cz: 5.19 / 3 }; 
const PATHS = {
    p1: [[2,3],[2,2],[2,1],[2,0],[1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[2,7],[2,6]],
    p2: [[0,3],[0,2],[0,1],[0,0],[1,0],[1,1],[1,2],[1,3],[1,4],[1,5],[1,6],[1,7],[0,7],[0,6]]
};

class Game3D {
    constructor(mode, isCinematic = false) {
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color('#2b1a10'); 
        this.scene.fog = new THREE.FogExp2('#2b1a10', 0.015);
        
        this.camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.raycaster = new THREE.Raycaster();
        this.mouse = new THREE.Vector2();
        
        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true; 
        this.controls.dampingFactor = 0.05;
        this.controls.target.set(0, 0, 0); 
        
        this.pieces = [];
        this.diceModels = [];
        this.turn = 1;
        this.rollValue = 0;
        this.isLocked = false;
        this.p1Pos = Array(7).fill(-1);
        this.p2Pos = Array(7).fill(-1);
        this.mode = mode;
        this.isCinematic = isCinematic;
        this.pointerDownPos = new THREE.Vector2();
        this.selectedPieceId = null;

        this.initScene();
        this.createEnvironment();
        this.createBoard();
        this.createDiceAndTray();
        this.createDecorations();
        this.createThickGuideLine();
        this.animate();

        window.addEventListener('pointerdown', (e) => { this.pointerDownPos.set(e.clientX, e.clientY); });
        window.addEventListener('pointerup', (e) => this.onPointerUp(e));
        window.addEventListener('pointermove', (e) => this.onMouseMove(e));
        
        window.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) { this.pointerDownPos.set(e.touches[0].clientX, e.touches[0].clientY); }
        }, {passive: true});
        window.addEventListener('touchend', (e) => this.onTouchEnd(e), {passive: false});

        this.isMobile = window.innerWidth < 768;
        this.defaultCamPos = this.isMobile ? {x: -28, y: 24, z: 12} : {x: -25, y: 16, z: 15};
        this.controls.maxPolarAngle = this.isMobile ? Math.PI / 2.8 : Math.PI / 2.6;
        this.controls.minDistance = 10;
        this.controls.maxDistance = 60; 

        if(this.isCinematic) {
            this.camera.position.set(30, 20, 30);
            this.controls.autoRotate = true;
            this.controls.autoRotateSpeed = 2.0; 
        } else {
            this.camera.position.set(this.defaultCamPos.x, this.defaultCamPos.y, this.defaultCamPos.z); 
        }
    }

    initScene() {
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        
        while (document.body.querySelector('canvas')) {
            document.body.removeChild(document.body.querySelector('canvas'));
        }
        document.body.appendChild(this.renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffedd9, 0.75); 
        this.scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffb87a, 1.8); 
        dirLight.position.set(12, 30, -10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        this.scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xff9944, 1.2, 100);
        pointLight.position.set(0, 15, 0);
        this.scene.add(pointLight);
    }

    createEnvironment() {
        textures.table.wrapS = THREE.RepeatWrapping; textures.table.wrapT = THREE.RepeatWrapping;
        textures.table.repeat.set(6, 6); 
        
        textures.tableSide.wrapS = THREE.RepeatWrapping; textures.tableSide.wrapT = THREE.RepeatWrapping;
        textures.tableSide.repeat.set(4, 1);

        const tableTopMat = new THREE.MeshStandardMaterial({ map: textures.table, color: 0x9c6d48, roughness: 0.9 });
        const tableSideMat = new THREE.MeshStandardMaterial({ map: textures.tableSide, color: 0x6e4a2d, roughness: 0.9 });
        
        const tableMaterials = [tableSideMat, tableSideMat, tableTopMat, tableSideMat, tableSideMat, tableSideMat];
        const table = new THREE.Mesh(new THREE.BoxGeometry(70, 2, 50), tableMaterials);
        table.position.set(0, -1, 0);
        table.receiveShadow = true;
        this.scene.add(table);

        const legGeo = new THREE.BoxGeometry(3, 15, 3);
        const legPositions = [ [-32, -8, -22], [32, -8, -22], [-32, -8, 22], [32, -8, 22] ];
        legPositions.forEach(pos => {
            const leg = new THREE.Mesh(legGeo, tableSideMat);
            leg.position.set(...pos);
            leg.castShadow = true;
            leg.receiveShadow = true;
            this.scene.add(leg);
        });

        textures.roomWall.wrapS = THREE.RepeatWrapping; textures.roomWall.wrapT = THREE.RepeatWrapping;
        textures.roomWall.repeat.set(5, 5); 
        const roomMat = new THREE.MeshStandardMaterial({ map: textures.roomWall, color: 0x8c6b4e, roughness: 1, side: THREE.BackSide });
        
        const room = new THREE.Mesh(new THREE.BoxGeometry(150, 80, 150), roomMat);
        room.position.y = 20;
        this.scene.add(room);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(150, 150), roomMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -15.5; 
        floor.receiveShadow = true;
        this.scene.add(floor);
    }

    createBoard() {
        const boardGroup = new THREE.Group();
        const cx = CONFIG.cx;
        const cz = CONFIG.cz;
        
        const shape = new THREE.Shape();
        shape.moveTo(-4 * cx, -1.5 * cz);
        shape.lineTo( 0 * cx, -1.5 * cz);
        shape.lineTo( 0 * cx, -0.5 * cz);
        shape.lineTo( 2 * cx, -0.5 * cz);
        shape.lineTo( 2 * cx, -1.5 * cz);
        shape.lineTo( 4 * cx, -1.5 * cz);
        shape.lineTo( 4 * cx,  1.5 * cz);
        shape.lineTo( 2 * cx,  1.5 * cz);
        shape.lineTo( 2 * cx,  0.5 * cz);
        shape.lineTo( 0 * cx,  0.5 * cz);
        shape.lineTo( 0 * cx,  1.5 * cz);
        shape.lineTo(-4 * cx,  1.5 * cz);
        shape.lineTo(-4 * cx, -1.5 * cz);

        const extrudeSettings = { depth: 1.2, bevelEnabled: false };
        const boardGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);

        boardGeo.computeBoundingBox();
        const bbox = boardGeo.boundingBox;
        const uvAttribute = boardGeo.attributes.uv;
        const posAttribute = boardGeo.attributes.position;
        for (let i = 0; i < uvAttribute.count; i++) {
            const x = posAttribute.getX(i);
            const y = posAttribute.getY(i);
            const z = posAttribute.getZ(i);
            if (z < 0.1 || z > 1.1) {
                const u = (x - bbox.min.x) / (bbox.max.x - bbox.min.x);
                const v = 1.0 - (y - bbox.min.y) / (bbox.max.y - bbox.min.y);
                uvAttribute.setXY(i, u, v);
            }
        }

        textures.boardSide.wrapS = THREE.RepeatWrapping;
        textures.boardSide.repeat.set(12, 1);

        // 🚨 إضافة ألوان خشبية لحماية الشكل إذا غابت الصورة 🚨
        const topMat = new THREE.MeshStandardMaterial({ map: textures.boardTex, color: 0xcca67d, roughness: 0.6 });
        const sideMat = new THREE.MeshStandardMaterial({ map: textures.boardSide, color: 0x6e4a2d, roughness: 0.8 });
        
        const boardMesh = new THREE.Mesh(boardGeo, [topMat, sideMat]);
        boardMesh.rotation.x = Math.PI / 2; 
        boardMesh.position.y = 1.2; 
        boardMesh.receiveShadow = true;
        boardMesh.castShadow = true;
        boardGroup.add(boardMesh);

        const lineMat = new THREE.LineBasicMaterial({ color: 0x4a2a1a, linewidth: 2 });
        for(let r=0; r<3; r++) {
            for(let c=0; c<8; c++) {
                if((r==0||r==2) && (c==4||c==5)) continue;
                const sqGeo = new THREE.BoxGeometry(cx, 1.2, cz); 
                const edges = new THREE.EdgesGeometry(sqGeo);
                const line = new THREE.LineSegments(edges, lineMat);
                line.position.set((c - 3.5) * cx, 0.6, (r - 1) * cz);
                boardGroup.add(line);
            }
        }

        this.scene.add(boardGroup);
        this.initPieces();
    }

    initPieces() {
        const createSet = (player) => {
            for(let i=0; i<7; i++) {
                const geo = new THREE.CylinderGeometry(0.72, 0.72, 0.15, 10); 

                const pTex = player === 1 ? textures.pieceBlue : textures.pieceRed;
                const baseColor = player === 1 ? 0x2244aa : 0xaa2222;
                const mat = new THREE.MeshStandardMaterial({ color: baseColor, map: pTex, metalness: 0.2, roughness: 0.5 });
                const piece = new THREE.Mesh(geo, mat);
                piece.castShadow = true; piece.receiveShadow = true;
                piece.userData = { type: 'piece', player, id: i, anim: null, baseY: 0 };
                
                const zOffset = player === 1 ? 5.5 : -5.5;
                piece.position.set(-6 + (i * 2), 0.25, zOffset); 
                piece.userData.baseY = 0.25; 

                if(player === 1) {
                    const dotGeo = new THREE.SphereGeometry(0.12, 16, 16);
                    dotGeo.applyMatrix4(new THREE.Matrix4().makeScale(1, 0.3, 1));
                    const dotMat = new THREE.MeshBasicMaterial({color: 0xffffff});
                    const dot = new THREE.Mesh(dotGeo, dotMat);
                    dot.position.y = 0.08;
                    piece.add(dot);
                }
                this.scene.add(piece);
                this.pieces.push(piece);
            }
        };
        createSet(1); createSet(2);
    }

    createDiceAndTray() {
        const trayGeo = new THREE.CylinderGeometry(3.5, 3, 0.5, 32);
        const trayMat = new THREE.MeshStandardMaterial({ map: textures.tray, color: 0x886644, metalness: 0.7, roughness: 0.6 });
        const tray = new THREE.Mesh(trayGeo, trayMat);
        tray.position.set(-14.5, 0.25, 0); 
        tray.receiveShadow = true; tray.castShadow = true;
        
        const trayInnerGeo = new THREE.CylinderGeometry(3.3, 2.8, 0.51, 32);
        const trayInnerMat = new THREE.MeshStandardMaterial({ map: textures.tray, color: 0x5a4322, metalness: 0.8, roughness: 0.8 });
        const trayInner = new THREE.Mesh(trayInnerGeo, trayInnerMat);
        trayInner.position.y = 0.1;
        tray.add(trayInner);
        this.scene.add(tray);

        const geo = new THREE.TetrahedronGeometry(0.65);
        for(let i=0; i<4; i++) {
            const mat = new THREE.MeshStandardMaterial({ map: textures.dice, color: 0xddddcc, roughness: 0.6, metalness: 0.2 });
            const die = new THREE.Mesh(geo, mat);
            die.position.set(-14.5 + (Math.random()*1.5 - 0.75), 1.15, (Math.random()*1.5 - 0.75));
            die.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, 0);
            die.castShadow = true;
            this.scene.add(die);
            this.diceModels.push(die);
        }
    }

    createDecorations() {
        const tabletMat = new THREE.MeshStandardMaterial({ map: textures.clay, color: 0xccaa88, roughness: 0.8 });
        
        const w = 2.1, l = 2.7, r = 0.3; 
        const shape = new THREE.Shape();
        shape.moveTo(-w + r, -l);
        shape.lineTo(w - r, -l);
        shape.quadraticCurveTo(w, -l, w, -l + r);
        shape.lineTo(w, l - r);
        shape.quadraticCurveTo(w, l, w - r, l);
        shape.lineTo(-w + r, l);
        shape.quadraticCurveTo(-w, l, -w, l - r);
        shape.lineTo(-w, -l + r);
        shape.quadraticCurveTo(-w, -l, -w + r, -l);

        const extrudeSettings = { depth: 0.1, bevelEnabled: true, bevelSegments: 4, steps: 1, bevelSize: 0.1, bevelThickness: 0.1 };
        const tabletGeo = new THREE.ExtrudeGeometry(shape, extrudeSettings);

        tabletGeo.computeBoundingBox();
        const bbox = tabletGeo.boundingBox;
        const uvAttribute = tabletGeo.attributes.uv;
        for (let i = 0; i < uvAttribute.count; i++) {
            const x = tabletGeo.attributes.position.getX(i);
            const y = tabletGeo.attributes.position.getY(i);
            const u = (x - bbox.min.x) / (bbox.max.x - bbox.min.x);
            const v = (y - bbox.min.y) / (bbox.max.y - bbox.min.y);
            uvAttribute.setXY(i, u, v);
        }

        tabletGeo.rotateX(Math.PI / 2); 

        const tablet1 = new THREE.Mesh(tabletGeo, tabletMat);
        tablet1.position.set(13, 0.4, -4); 
        tablet1.rotation.y = -Math.PI / 6; 
        tablet1.castShadow = true;
        this.scene.add(tablet1);
    }

    createThickGuideLine() {
        this.guideMesh = new THREE.Mesh(new THREE.BufferGeometry(), new THREE.MeshBasicMaterial({ color: 0xffffff, alphaMap: dashTexture, transparent: true, opacity: 0.8, depthTest: false }));
        this.scene.add(this.guideMesh);
        this.guideMesh.visible = false;
        this.guideMesh.renderOrder = 999; 
    }

    logChat(msg) {
        const log = document.getElementById('chat-log');
        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = msg;
        log.appendChild(entry);
        if(log.children.length > 3) log.removeChild(log.firstChild);
    }

    async rollDice() {
        if(this.isLocked || this.isCinematic) return;
        this.isLocked = true;
        this.selectedPieceId = null; 
        if(this.guideMesh) this.guideMesh.visible = false;
        
        const btn = document.getElementById('btn-roll');
        btn.classList.add('disabled');
        playSFX('dice');

        let val = 0;
        const anims = [];

        this.diceModels.forEach((die) => {
            const isLit = Math.random() < 0.5;
            if(isLit) val++;
            
            anims.push(gsap.to(die.rotation, { x: Math.random()*10, y: Math.random()*10, duration: 0.6, ease: "power2.out" }));
            anims.push(gsap.to(die.position, { y: 3.5, duration: 0.3, yoyo: true, repeat: 1, ease: "power1.out", x: -14.5 + (Math.random()*2 - 1), z: (Math.random()*2 - 1) }));
            anims.push(gsap.to(die.material, { emissive: isLit ? 0xffffff : 0x000000, emissiveIntensity: isLit ? 0.3 : 0, duration: 0.6 }));
        });

        await Promise.all(anims);
        this.rollValue = val;
        this.logChat(`Rolled: <b>${val}</b>`);

        if(val === 0) {
            setTimeout(() => this.switchTurn(), 1000);
        } else {
            const moves = this.getPossibleMoves(this.turn);
            if(moves.length === 0) {
                this.logChat("No moves available.");
                setTimeout(() => this.switchTurn(), 1000);
            } else if(this.turn === 2 && this.mode === 'BOT') {
                setTimeout(() => this.aiMove(moves), 1000);
            } else {
                this.isLocked = false;
                this.highlightValidPieces(moves);
                this.logChat("Select a piece to move");
            }
        }
    }

    getPossibleMoves(p) {
        const my = p === 1 ? this.p1Pos : this.p2Pos;
        const opp = p === 1 ? this.p2Pos : this.p1Pos;
        return my.map((pos, i) => i).filter(i => {
            const target = my[i] + this.rollValue;
            if(target > 14) return false;
            if(my.includes(target) && target !== 14) return false;
            if(target === 7 && opp.includes(7)) return false;
            return true;
        });
    }

    highlightValidPieces(moves) {
        this.pieces.forEach(p => {
            if (p.userData.player === this.turn && moves.includes(p.userData.id)) {
                if (!p.userData.anim) {
                    p.userData.baseY = p.position.y;
                    p.userData.anim = gsap.to(p.position, { y: p.userData.baseY + 0.5, duration: 0.4, yoyo: true, repeat: -1 });
                }
            }
        });
    }

    clearHighlights() {
        this.pieces.forEach(p => {
            if (p.userData.anim) {
                p.userData.anim.kill(); p.userData.anim = null;
                gsap.to(p.position, { y: p.userData.baseY, duration: 0.2 });
            }
        });
    }

    drawGuideLine(piece) {
        const path = piece.userData.player === 1 ? PATHS.p1 : PATHS.p2;
        const newPosIdx = (piece.userData.player === 1 ? this.p1Pos[piece.userData.id] : this.p2Pos[piece.userData.id]) + this.rollValue;

        let targetX = newPosIdx < 14 ? (path[newPosIdx][1] - 3.5) * CONFIG.cx : 14;
        let targetZ = newPosIdx < 14 ? (path[newPosIdx][0] - 1) * CONFIG.cz : piece.position.z;

        const start = piece.position.clone();
        const end = new THREE.Vector3(targetX, 1.4, targetZ);
        const mid = start.clone().lerp(end, 0.5); mid.y += 3; 

        if(this.guideMesh.geometry) this.guideMesh.geometry.dispose();
        this.guideMesh.geometry = new THREE.TubeGeometry(new THREE.QuadraticBezierCurve3(start, mid, end), 30, 0.15, 8, false);
        this.guideMesh.visible = true;
    }

    onTouchEnd(event) {
        if (this.isCinematic || this.isLocked || this.rollValue === 0) return;
        if (event.changedTouches.length > 0) {
            let touch = event.changedTouches[0];
            if (Math.hypot(touch.clientX - this.pointerDownPos.x, touch.clientY - this.pointerDownPos.y) > 15) return;
            
            this.mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
            this.mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            this.raycastPiece();
        }
    }

    onMouseMove(event) {
        if (this.selectedPieceId !== null || this.isMobile) return; 

        let cx = event.clientX; let cy = event.clientY;
        this.mouse.x = (cx / window.innerWidth) * 2 - 1; this.mouse.y = -(cy / window.innerHeight) * 2 + 1;

        if (this.isLocked || this.isCinematic || this.rollValue === 0 || (this.mode === 'BOT' && this.turn === 2)) {
            if(this.guideMesh) this.guideMesh.visible = false;
            return;
        }

        this.raycaster.setFromCamera(this.mouse, this.camera);
        const intersects = this.raycaster.intersectObjects(this.pieces);
        if (intersects.length > 0) {
            const obj = intersects[0].object;
            if (obj.userData.player === this.turn && this.getPossibleMoves(this.turn).includes(obj.userData.id)) {
                this.drawGuideLine(obj);
                return;
            }
        }
        if(this.guideMesh) this.guideMesh.visible = false;
    }

    onPointerUp(event) {
        if (this.isCinematic || this.isLocked || this.rollValue === 0) return;
        if (event.pointerType === 'touch') return; 
        if (Math.hypot(event.clientX - this.pointerDownPos.x, event.clientY - this.pointerDownPos.y) > 10) return; 

        this.mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        this.mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        this.raycastPiece();
    }

    raycastPiece() {
        this.raycaster.setFromCamera(this.mouse, this.camera);
        const intersects = this.raycaster.intersectObjects(this.pieces);
        
        if(intersects.length > 0) {
            const obj = intersects[0].object;
            if(obj.userData.player === this.turn && this.getPossibleMoves(this.turn).includes(obj.userData.id)) {
                if (this.selectedPieceId === obj.userData.id) {
                    this.movePiece(obj.userData.id, this.turn);
                    this.selectedPieceId = null;
                } else {
                    this.selectedPieceId = obj.userData.id;
                    this.drawGuideLine(obj);
                    this.logChat("Tap again to confirm");
                }
            } else {
                this.selectedPieceId = null;
                if(this.guideMesh) this.guideMesh.visible = false;
            }
        } else {
            this.selectedPieceId = null;
            if(this.guideMesh) this.guideMesh.visible = false;
        }
    }

    async movePiece(pIdx, player) {
        this.isLocked = true;
        this.guideMesh.visible = false; 
        this.clearHighlights(); 
        
        playSFX('move');
        
        const my = player === 1 ? this.p1Pos : this.p2Pos;
        const opp = player === 1 ? this.p2Pos : this.p1Pos;
        const path = player === 1 ? PATHS.p1 : PATHS.p2;
        const oppPath = player === 1 ? PATHS.p2 : PATHS.p1;

        my[pIdx] += this.rollValue;
        const newPosIdx = my[pIdx];
        const pieceObj = this.pieces.find(p => p.userData.player === player && p.userData.id === pIdx);

        if(newPosIdx < 14) {
            const targetX = (path[newPosIdx][1] - 3.5) * CONFIG.cx;
            const targetZ = (path[newPosIdx][0] - 1) * CONFIG.cz;
            
            gsap.to(pieceObj.position, { x: targetX, z: targetZ, duration: 0.6, ease: "power2.inOut" });
            await gsap.to(pieceObj.position, { y: 3, duration: 0.3, yoyo: true, repeat: 1, ease: "power1.inOut" });
            pieceObj.position.y = 1.35; 
            pieceObj.userData.baseY = 1.35; 

            if(newPosIdx >= 4 && newPosIdx <= 11) {
                const capturedIdx = opp.findIndex((pos, i) => pos !== -1 && pos !== 14 && oppPath[pos][0] === path[newPosIdx][0] && oppPath[pos][1] === path[newPosIdx][1]);
                if(capturedIdx !== -1) {
                    opp[capturedIdx] = -1;
                    const oppPiece = this.pieces.find(p => p.userData.player !== player && p.userData.id === capturedIdx);
                    gsap.to(oppPiece.position, { x: -6 + (capturedIdx*2), y: 0.25, z: player === 1 ? -5.5 : 5.5, duration: 0.6, ease: "bounce.out" });
                    oppPiece.userData.baseY = 0.25; 
                    this.logChat("⚔️ Enemy piece captured!");
                }
            }

            const isRosette = (path[newPosIdx][0]===0&&path[newPosIdx][1]===0)||(path[newPosIdx][0]===0&&path[newPosIdx][1]===6)||(path[newPosIdx][0]===1&&path[newPosIdx][1]===3)||(path[newPosIdx][0]===2&&path[newPosIdx][1]===0)||(path[newPosIdx][0]===2&&path[newPosIdx][1]===6);
            if(isRosette) {
                this.logChat("🌸 Rosette! Roll again.");
                this.resetForNextRoll();
                if(this.turn === 2 && this.mode === 'BOT') {
                    setTimeout(() => this.rollDice(), 1500); 
                }
                return;
            }
        } else {
            gsap.to(pieceObj.position, { x: 14, y: 0.25, duration: 0.6 });
            pieceObj.userData.baseY = 0.25;
            this.logChat("🏁 Piece secured!");
            this.updateScore();
        }

        this.switchTurn();
    }

    aiMove(moves) { this.movePiece(moves[0], 2); }

    switchTurn() {
        this.turn = this.turn === 1 ? 2 : 1;
        this.resetForNextRoll();
        
        const turnImg = document.getElementById('img-turn');
        if (turnImg) {
            turnImg.src = this.turn === 1 ? UI_ASSETS.turnP1 : UI_ASSETS.turnP2;
        }

        if(this.turn === 2 && this.mode === 'BOT') setTimeout(() => this.rollDice(), 1500); 
    }

    resetForNextRoll() {
        this.isLocked = false;
        this.rollValue = 0;
        this.selectedPieceId = null;
        
        const btn = document.getElementById('btn-roll');
        
        if(this.mode === 'BOT' && this.turn === 2) {
            if (btn) btn.classList.add('disabled');
        } else {
            if (btn) btn.classList.remove('disabled');
        }
        
        this.clearHighlights();
    }

    updateScore() {
        const s1 = this.p1Pos.filter(p => p === 14).length;
        const s2 = this.p2Pos.filter(p => p === 14).length;
        
        document.getElementById('s1').innerText = s1;
        document.getElementById('s2').innerText = s2;
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        dashTexture.offset.x -= 0.04; 
        this.controls.update(); 
        this.renderer.render(this.scene, this.camera);
    }
}

let game;
let savedMode = 'PVP';

function startCinematicIntro(mode) {
    savedMode = mode;
    document.getElementById('launcher').style.display = 'none';
    document.getElementById('intro-overlay').style.display = 'flex';
    game = new Game3D(mode, true);
    
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function showZoomHint() {
    const hint = document.getElementById('zoom-hint');
    if(hint) {
        hint.style.display = 'block';
        gsap.to(hint, {opacity: 1, duration: 0.5});
        setTimeout(() => {
            gsap.to(hint, {opacity: 0, duration: 0.5, onComplete: () => hint.style.display = 'none'});
        }, 4000);
    }
}

function endCinematicIntro() {
    document.getElementById('intro-overlay').style.display = 'none';
    
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const audio = document.getElementById('bg-music');
    if (audio) {
        const slider = document.getElementById('bgm-slider');
        if (slider) audio.volume = parseFloat(slider.value); 
        let playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.catch(error => {
                window.addEventListener('pointerdown', () => audio.play(), { once: true });
            });
        }
    }

    game.isCinematic = false;
    game.controls.autoRotate = false;
    
    document.getElementById('ui-layer').style.display = 'block';
    showZoomHint(); 

    let tl = gsap.timeline();
    tl.to(game.camera.position, {
        x: game.defaultCamPos.x, y: game.defaultCamPos.y, z: game.defaultCamPos.z, 
        duration: 1.5, ease: "power2.inOut"
    })
    .to(game.camera.position, {
        x: game.defaultCamPos.x * 0.7, y: game.defaultCamPos.y * 0.7, z: game.defaultCamPos.z * 0.7,
        duration: 0.8, ease: "power1.inOut", delay: 0.2
    })
    .to(game.camera.position, {
        x: game.defaultCamPos.x, y: game.defaultCamPos.y, z: game.defaultCamPos.z,
        duration: 0.8, ease: "power1.inOut"
    });
}

function restartGame() {
    closeSettings();
    document.getElementById('ui-layer').style.display = 'none';
    if (game) {
        game = new Game3D(savedMode, true); 
    }
    endCinematicIntro(); 
    document.getElementById('s1').innerText = "0";
    document.getElementById('s2').innerText = "0";
}

function exitGame() {
    closeSettings();
    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('launcher').style.display = 'flex';
    const bgMusic = document.getElementById('bg-music');
    if (bgMusic) bgMusic.pause(); 
    while (document.body.querySelector('canvas')) {
        document.body.removeChild(document.body.querySelector('canvas'));
    }
    game = null;
    document.getElementById('s1').innerText = "0";
    document.getElementById('s2').innerText = "0";
}

window.addEventListener('resize', () => {
    if(!game) return;
    game.isMobile = window.innerWidth < 768;
    game.defaultCamPos = game.isMobile ? {x: -28, y: 24, z: 12} : {x: -25, y: 16, z: 15};
    game.controls.maxPolarAngle = game.isMobile ? Math.PI / 2.8 : Math.PI / 2.6;
    
    if(!game.isCinematic) {
        game.camera.position.set(game.defaultCamPos.x, game.defaultCamPos.y, game.defaultCamPos.z);
    }
    game.camera.aspect = window.innerWidth / window.innerHeight;
    game.camera.updateProjectionMatrix();
    game.renderer.setSize(window.innerWidth, window.innerHeight);
});

// إجبار التحديث السريع للصفحة عشان يقرأ الصور الجديدة
window.addEventListener('load', function() {
    // هذي الدالة تتأكد إن الصور تحملت بشكل صحيح
});
